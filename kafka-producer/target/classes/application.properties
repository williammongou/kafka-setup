# ──────────────────────────────────────────────
# App identity
# ──────────────────────────────────────────────
spring.application.name=kafka-producer

# ──────────────────────────────────────────────
# Kafka broker connection
# Port 9093 is used for host machine connections (see docker-compose.yml)
# Change this one line to point at your EC2 instance later:
#   spring.kafka.bootstrap-servers=<EC2-PUBLIC-IP>:9093
# ──────────────────────────────────────────────
spring.kafka.bootstrap-servers=localhost:9093

# ──────────────────────────────────────────────
# Producer tuning
# ──────────────────────────────────────────────

# acks=all  → the broker leader AND all in-sync replicas must acknowledge the write
#             before Kafka considers it successful. Safest option — no data loss.
# acks=1    → only the leader acknowledges (faster, small risk of loss on leader crash)
# acks=0    → fire and forget (fastest, data can be lost)
spring.kafka.producer.acks=all

# How many times to retry a failed send before giving up
spring.kafka.producer.retries=3

# How many records to batch together before sending to the broker.
# Higher = better throughput, slight increase in latency.
spring.kafka.producer.batch-size=16384

# How long (ms) to wait to fill a batch before sending anyway.
# 0 = send immediately (lowest latency). 5–100ms = better throughput.
spring.kafka.producer.properties.linger.ms=5

# ──────────────────────────────────────────────
# Topic name (injected into OrderEventProducer)
# ──────────────────────────────────────────────
kafka.topic.orders=orders

# ──────────────────────────────────────────────
# Server port
# ──────────────────────────────────────────────
server.port=8080

version: '3.8'

# This runs a single-node Kafka broker using KRaft mode.
# KRaft = Kafka Raft — the modern way to run Kafka WITHOUT ZooKeeper.
# Before KRaft you needed a separate ZooKeeper process just to manage Kafka's metadata.
# Now Kafka handles its own consensus internally.

services:

  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      # Exposes Kafka on your host machine at localhost:9092
      # Your Spring Boot producer connects here
      - "9092:9092"
    environment:
      # Each broker in a cluster has a unique ID
      KAFKA_NODE_ID: 1

      # This node acts as both a broker (handles client traffic)
      # and a controller (manages cluster metadata / leader election)
      KAFKA_PROCESS_ROLES: broker,controller

      # PLAINTEXT://0.0.0.0:9092  → listens for producer/consumer connections on all interfaces
      # CONTROLLER://0.0.0.0:9093 → internal port used for KRaft leader election
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093

      # This is what Kafka tells clients to connect to.
      # localhost:9092 works when your Spring Boot app runs on the same machine.
      # When you move to EC2, this becomes the EC2 public IP.
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092

      # Tells the controller where to find quorum voters: nodeId@host:port
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT

      # Since we have only 1 broker, replication factor must be 1
      # (can't replicate across brokers that don't exist)
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      # Automatically create topics when a producer first writes to them.
      # Convenient for dev — in production you'd create topics explicitly.
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

      # A unique ID for this KRaft cluster (base64-encoded UUID).
      # Must be set for KRaft mode — just needs to be consistent.
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"

    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka UI — a web dashboard to inspect topics, messages, consumer groups
  # Visit http://localhost:8090 after running docker compose up
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

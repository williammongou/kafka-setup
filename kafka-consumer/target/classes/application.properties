# ──────────────────────────────────────────────
# App identity
# ──────────────────────────────────────────────
spring.application.name=kafka-consumer

# ──────────────────────────────────────────────
# Kafka broker connection
# Port 9093 is used for host machine connections (see docker-compose.yml)
# Change this one line to point at your EC2 instance later:
#   spring.kafka.bootstrap-servers=<EC2-PUBLIC-IP>:9093
# ──────────────────────────────────────────────
spring.kafka.bootstrap-servers=localhost:9093

# ──────────────────────────────────────────────
# Consumer configuration
# ──────────────────────────────────────────────

# Consumer group ID - all consumers with the same group ID share the workload
# (each message goes to only ONE consumer in the group)
# If you run multiple instances of this app, they'll load-balance automatically
spring.kafka.consumer.group-id=order-consumer-group

# Where to start consuming if no offset is stored yet:
#   earliest = read from the beginning of the topic (good for testing/replay)
#   latest   = only read NEW messages (skip old ones)
spring.kafka.consumer.auto-offset-reset=earliest

# When to commit offsets (mark messages as "consumed"):
#   true  = auto-commit every 5 seconds (simple but can reprocess on crash)
#   false = manual commit (more control, exactly-once processing)
spring.kafka.consumer.enable-auto-commit=true

# How often to auto-commit offsets (in milliseconds)
spring.kafka.consumer.auto-commit-interval=5000

# Key deserializer: converts byte array back to String
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Value deserializer: converts byte array back to JSON, then to OrderEvent object
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

# Tell Jackson which class to deserialize JSON into
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=com.demo.kafka.model.OrderEvent

# ──────────────────────────────────────────────
# Custom polling configuration
# ──────────────────────────────────────────────

# Maximum number of records to fetch in a single poll
# Lower = process messages in smaller batches (more frequent polls)
# Higher = better throughput but higher latency
spring.kafka.consumer.max-poll-records=10

# Maximum time to wait for poll() to return records (milliseconds)
# This is the "polling rate" - consumer checks for new messages this often
kafka.consumer.poll-interval-ms=3000

# ──────────────────────────────────────────────
# Topic name (must match the producer's topic)
# ──────────────────────────────────────────────
kafka.topic.orders=orders

# ──────────────────────────────────────────────
# Server port (avoiding conflicts with producer on 8080)
# ──────────────────────────────────────────────
server.port=8081
